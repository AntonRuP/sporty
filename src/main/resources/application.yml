spring:
  application:
    name: sporty
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 0
      properties:
        delivery.timeout.ms: 5000
        request.timeout.ms: 3000
        spring.json.add.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  polling:
    interval-ms: ${POLLING_INTERVAL_MS:10000}
  kafka:
    topic: ${SPORTY_KAFKA_TOPIC:live-score-updates}

logging:
  level:
    com.sporty: INFO
